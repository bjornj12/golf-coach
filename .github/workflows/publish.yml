name: Publish to PyPI

# Publishes to PyPI on a version tag (e.g. `v0.1.0`) using PyPI Trusted
# Publishing (OIDC) — no API token is stored anywhere. See PUBLISHING.md for the
# one-time PyPI-side setup that authorizes this exact workflow.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$VER"
          test "$TAG" = "$VER" || { echo "::error::tag v$TAG does not match pyproject version $VER"; exit 1; }

      - name: Lint, type-check, test (gate the release)
        run: |
          uv sync --extra dev
          uv run ruff check src tests
          uv run mypy
          uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  desktop-extension:
    needs: publish      # only ship the .mcpb once the package it depends on is live
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create the GitHub Release and upload the asset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build the Claude Desktop bundle (.mcpb)
        run: |
          npm install -g @anthropic-ai/mcpb
          mkdir -p dist
          mcpb pack mcpb dist/trackman-golf.mcpb

      - name: Publish GitHub Release with the .mcpb attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/trackman-golf.mcpb \
            --title "trackman-mcp $GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" dist/trackman-golf.mcpb --clobber
